# yaml-language-server: $schema=https://microsoft.github.io/apm/specs/schemas/manifest-v0.1.schema.json

name: opentofu
version: 0.1.0

author: Kilian PAQUIER
description: OpenTofu MCP Server for accessing the OpenTofu Registry
license: MIT

dependencies:
  mcp:
    - name: opentofu
      registry: "false"
      transport: stdio
      command: npx
      args: ["-y", "@opentofu/opentofu-mcp-server"]

