# yaml-language-server: $schema=https://microsoft.github.io/apm/specs/schemas/manifest-v0.1.schema.json

name: typescript-lsp
version: 0.1.0

author: Kilian PAQUIER
description: TypeScript/JavaScript language server activation for enhanced code intelligence
license: MIT

dependencies:
  lsp:
    - name: typescript-lsp
      command: typescript-language-server
      args: ["--stdio"]
      extensionToLanguage:
        ".cjs": javascript
        ".cts": typescript
        ".js": javascript
        ".jsx": javascriptreact
        ".mjs": javascript
        ".mts": typescript
        ".ts": typescript
        ".tsx": typescriptreact

# targets: [claude, codex, copilot, cursor, gemini, kiro, opencode, windsurf]
