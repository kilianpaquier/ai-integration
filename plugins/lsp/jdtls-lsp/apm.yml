# yaml-language-server: $schema=https://microsoft.github.io/apm/specs/schemas/manifest-v0.1.schema.json

name: jdtls-lsp
version: 0.1.0

author: Kilian PAQUIER
description: Java language server (Eclipse JDT.LS) activation for code intelligence
license: MIT

dependencies:
  lsp:
    - name: jdtls-lsp
      command: jdtls
      extensionToLanguage:
        ".java": java
      startupTimeout: 120000

