# yaml-language-server: $schema=https://microsoft.github.io/apm/specs/schemas/manifest-v0.1.schema.json

name: gopls-lsp
version: 0.1.0

author: Kilian PAQUIER
description: Go language server activation for code intelligence and refactoring
license: MIT

dependencies:
  lsp:
    - name: gopls-lsp
      command: gopls
      args: ["serve"]
      extensionToLanguage:
        ".go": go

