# yaml-language-server: $schema=https://microsoft.github.io/apm/specs/schemas/manifest-v0.1.schema.json

name: kotlin-lsp
version: 0.1.0

author: Kilian PAQUIER
description: Kotlin language server activation for code intelligence
license: MIT

dependencies:
  lsp:
    - name: kotlin-lsp
      command: kotlin-lsp
      args: ["--stdio"]
      extensionToLanguage:
        ".kt": kotlin
        ".kts": kotlin
      startupTimeout: 120000

