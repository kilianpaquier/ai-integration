# yaml-language-server: $schema=https://microsoft.github.io/apm/specs/schemas/manifest-v0.1.schema.json

name: bunch-of
version: 0.1.0

author: Kilian PAQUIER
description: An humble marketplace for AI plugins
license: MIT

marketplace:
  outputs:
    claude: {}
    codex: {}

  owner:
    name: Kilian PAQUIER
    url: https://kilianpaquier.dev

  packages:
    - category: hybrid
      name: cavekit
      # renovate: datasource=github-tags packageName=JuliusBrussee/cavekit depName=cavekit
      ref: c322f0bb6db82163041930467f3ce32754d42827 # v4.1.0
      source: JuliusBrussee/cavekit

    - category: hybrid
      name: caveman
      # renovate: datasource=github-tags packageName=JuliusBrussee/caveman depName=caveman
      ref: 033f918602bd5319931256a537c4bd9ea7a48c25 # v1.9.1
      source: JuliusBrussee/caveman

    - category: hybrid
      name: claude-5h-window-spread
      # renovate: datasource=github-tags packageName=Digital-Process-Tools/claude-5h-window-spread depName=claude-5h-window-spread
      ref: 75b4763c7773142f270967c3cd7f8d8f86c65372
      source: Digital-Process-Tools/claude-5h-window-spread

    - category: mcp
