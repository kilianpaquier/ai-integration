# yaml-language-server: $schema=https://microsoft.github.io/apm/specs/schemas/manifest-v0.1.schema.json

name: one-for-all
version: 0.1.0

author: Kilian PAQUIER
description: An humble marketplace for AI plugins
license: MIT

marketplace:
  outputs:
    claude: {}
    codex: {}

  owner:
    name: Kilian PAQUIER
    url: https://kilianpaquier.dev

  packages:
  - category: hooks
    name: caveman-autostart
    source: ./plugins/caveman-autostart

  - category: mcp
    name: cavemem
    source: ./plugins/mcp/cavemem

  - category: mcp
    name: codebase-memory-mcp
    source: ./plugins/mcp/codebase-memory-mcp

  - category: mcp
    name: codegraph
    source: ./plugins/mcp/codegraph

  - category: mcp
    name: context7
    source: ./plugins/mcp/context7

  - category: mcp
    name: github
    source: ./plugins/mcp/github

  - category: mcp
    name: gitlab
    source: ./plugins/mcp/gitlab

  - category: lsp
    name: gopls-lsp
    source: ./plugins/lsp/gopls-lsp

  - category: lsp
    name: jdtls-lsp
    source: ./plugins/lsp/jdtls-lsp

  - category: lsp
    name: kotlin-lsp
    source: ./plugins/lsp/kotlin-lsp

  - category: mcp
    name: opentofu
    source: ./plugins/mcp/opentofu

  - category: mcp
    name: playwright
    source: ./plugins/mcp/playwright

  - category: hooks
    name: protected-paths
    source: ./plugins/protected-paths

  - category: skills
    name: schema-converter
    source: ./plugins/schema-converter

  - category: lsp
    name: typescript-lsp
    source: ./plugins/lsp/typescript-lsp
