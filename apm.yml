      # renovate: datasource=github-tags packageName=MemPalace/mempalace depName=mempalace
      ref: 2c08bb251d2649057c2e7a48fa725fed9a89ddc6 # v3.5.0
      source: MemPalace/mempalace

    - category: mcp
      name: opentofu
      source: ./plugins/mcp/opentofu

    - category: mcp
